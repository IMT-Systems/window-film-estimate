<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>窓フィルム見積計算</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #2b2723;
    --ink-soft: #8a7f73;
    --line: #e7dfd4;
    --line-strong: #cfc3b3;
    --paper: #f7f2ea;
    --card: #fffdfa;
    --accent: #2f4a44;
    --accent-2: #b08a52;
    --accent-soft: #eef2ee;
    --accent-text: #2f4a44;
    --danger: #a4543f;
    --danger-soft: #f6e9e3;
    --shadow: 0 1px 2px rgba(43,39,35,0.04), 0 8px 24px -8px rgba(43,39,35,0.10);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Zen Kaku Gothic New", -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
    background:
      radial-gradient(900px 500px at 100% -10%, rgba(176,138,82,0.10), transparent 60%),
      var(--paper);
    color: var(--ink);
    line-height: 1.65;
  }
  .wrap {
    max-width: 560px;
    margin: 0 auto;
    padding: 0 16px 90px;
  }
  header {
    margin: 0 -16px 28px;
    padding: 40px 16px 28px;
    background:
      linear-gradient(135deg, #2f4a44 0%, #233a35 100%);
    color: #f3efe6;
    border-radius: 0 0 28px 28px;
    box-shadow: var(--shadow);
  }
  header .label {
    font-family: "Shippori Mincho", serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: #f3efe6;
    margin: 0 0 4px;
  }
  header h1 {
    font-family: "Shippori Mincho", serif;
    font-size: 22px;
    font-weight: 700;
    margin: 0;
    letter-spacing: 0.05em;
    color: #f3efe6;
  }
  header .sub {
    font-size: 30px;
    font-weight: 700;
    margin: 10px 0 0;
    letter-spacing: -0.01em;
    color: #f3efe6;
    text-align: center;
  }
  section {
    margin-bottom: 30px;
  }
  section h2 {
    font-family: "Shippori Mincho", serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: 0.03em;
    margin: 0 0 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  section h2::before {
    content: "";
    width: 4px;
    height: 14px;
    background: var(--accent-2);
    border-radius: 2px;
    display: inline-block;
  }
  .hint {
    font-size: 12px;
    color: var(--ink-soft);
    margin: -6px 0 14px;
  }
  .film-row, .window-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    box-shadow: var(--shadow);
  }
  .film-row {
    display: flex;
    gap: 8px;
    align-items: center;
    padding: 12px 14px;
    margin-bottom: 10px;
  }
  .film-row input[type="text"] {
    flex: 1.6;
    min-width: 0;
  }
  .film-row input[type="number"] {
    flex: 1;
    min-width: 0;
  }
  .film-row .unit {
    font-size: 12px;
    color: var(--ink-soft);
    white-space: nowrap;
  }
  input, select {
    font-family: inherit;
    font-size: 15px;
    padding: 9px 11px;
    border: 1px solid var(--line-strong);
    border-radius: 9px;
    background: var(--paper);
    color: var(--ink);
    width: 100%;
  }
  input:focus, select:focus {
    outline: none;
    border-color: var(--accent-2);
    box-shadow: 0 0 0 3px rgba(176,138,82,0.15);
  }
  button {
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    border-radius: 9px;
    border: 1px solid var(--line-strong);
    background: var(--card);
    color: var(--ink);
    padding: 10px 14px;
    transition: all 0.15s ease;
  }
  button:hover { background: var(--accent-soft); border-color: var(--accent); }
  button:active { transform: scale(0.97); }
  .icon-btn {
    border: none;
    background: transparent;
    color: var(--danger);
    padding: 6px 10px;
    font-size: 12px;
    box-shadow: none;
  }
  .icon-btn:hover { background: var(--danger-soft); border-radius: 6px; }
  .add-btn {
    width: 100%;
    margin-top: 6px;
    border: 1.5px dashed var(--accent-2);
    color: var(--accent);
    background: transparent;
    box-shadow: none;
    font-weight: 600;
  }
  .add-btn:hover { background: var(--accent-soft); }
  .window-card {
    padding: 16px;
    margin-bottom: 14px;
  }
  .window-card .row-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    padding-bottom: 10px;
    border-bottom: 1px dashed var(--line);
  }
  .window-card .row-head span {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--accent-2);
    text-transform: uppercase;
  }
  .grid2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 8px;
  }
  .field label {
    display: block;
    font-size: 11px;
    color: var(--ink-soft);
    margin-bottom: 4px;
    letter-spacing: 0.02em;
  }
  .row-subtotal {
    font-size: 12px;
    color: var(--ink-soft);
    text-align: right;
    margin: 10px 0 0;
    font-weight: 500;
  }
  .film-summary-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--card);
    border: 1px solid var(--line);
    border-left: 3px solid var(--accent-2);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 8px;
    box-shadow: var(--shadow);
  }
  .film-summary-row .fname { font-size: 13px; font-weight: 700; margin: 0; }
  .film-summary-row .fcalc { font-size: 14px; color: var(--ink-soft); margin: 3px 0 0; }
  .film-summary-row .ftotal { font-size: 16px; font-weight: 700; margin: 0; color: var(--accent); }
  .empty-note {
    font-size: 13px;
    color: var(--ink-soft);
  }
  .total-box {
    background: linear-gradient(135deg, #2f4a44 0%, #233a35 100%);
    border-radius: 18px;
    padding: 22px 20px;
    box-shadow: var(--shadow);
    color: #f3efe6;
  }
  .total-box .label2 {
    font-size: 11px;
    letter-spacing: 0.1em;
    color: #c9b88f;
    margin: 0 0 6px;
  }
  .total-box .amount {
    font-family: "Shippori Mincho", serif;
    font-size: 32px;
    font-weight: 700;
    margin: 0;
  }
  .total-box .commission {
    font-size: 12px;
    color: #c9b88f;
    text-align: right;
    margin: 10px 0 0;
  }
  .save-status {
    font-size: 11px;
    color: var(--ink-soft);
    text-align: right;
    margin-top: 8px;
  }
  .print-btn {
    width: 100%;
    margin-top: 18px;
    padding: 14px;
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    background: var(--accent-2);
    border: none;
    box-shadow: var(--shadow);
  }
  .print-btn:hover { background: #9a753f; }

  @media print {
    body { background: #fff; }
    header { background: #2f4a44 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .total-box { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    #add-film, #add-window, .icon-btn, .print-btn, .save-status { display: none !important; }
    input, select { border: none; background: transparent; padding: 2px 0; }
    .window-card, .film-row, .film-summary-row { box-shadow: none; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <p class="label">窓フィルム工房<br>&nbsp;&nbsp;&nbsp;~WINDOW WORKS~</p>
    <p class="sub">見積計算ツール</p>
  </header>

  <section>
    <h2>フィルム単価表</h2>
    <div id="film-list"></div>
    <button class="add-btn" id="add-film">+ フィルムを追加</button>
  </section>

  <section>
    <h2>窓の寸法</h2>
    <p class="hint">各窓の面積(枚数込み)を小数点第1位で四捨五入し、その値に単価をかけます。</p>
    <div id="window-list"></div>
    <button class="add-btn" id="add-window">+ 窓を追加</button>
  </section>

  <section>
    <h2>フィルム別 集計</h2>
    <div id="film-summary"></div>
  </section>

  <div class="total-box">
    <p class="label2">見積金額(合計)</p>
    <p class="amount" id="total-price-out">¥0</p>
    <p class="commission" id="commission-out">大輔の取り分10%: ¥0</p>
  </div>

  <button id="print-btn" class="print-btn">📄 見積をPDFで保存</button>

  <p class="save-status" id="save-status">保存済み</p>
  <p class="hint" style="text-align:right; margin-top:-2px;">※このデータはリンクを知っている人全員で共有されます</p>

</div>

<script>
const DEFAULT_FILMS = [
  { id: 1, name: 'シルバー遮熱', price: 13500 },
  { id: 2, name: 'クリア遮熱', price: 15500 },
  { id: 3, name: '飛散防止', price: 10500 }
];
const DEFAULT_WINDOWS = [
  { id: 1, width: 1000, height: 1200, qty: 1, filmId: 1 }
];

let films = [];
let windows = [];
let filmCounter = 0;
let windowCounter = 0;
let saveTimer = null;

function round1(n) {
  return Math.round(n * 10) / 10;
}

function markSaving() {
  const el = document.getElementById('save-status');
  el.textContent = '保存中…';
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => { el.textContent = '保存済み'; }, 500);
}

function hasStorage() {
  return typeof window.storage !== 'undefined' && window.storage !== null;
}

async function saveState() {
  if (!hasStorage()) return;
  try {
    await window.storage.set('films', JSON.stringify(films), true);
    await window.storage.set('windows', JSON.stringify(windows), true);
    markSaving();
  } catch (err) {
    console.error('保存に失敗しました', err);
  }
}

async function loadState() {
  if (!hasStorage()) {
    films = DEFAULT_FILMS.slice();
    windows = DEFAULT_WINDOWS.slice();
    filmCounter = films.reduce((max, f) => Math.max(max, f.id), 0);
    windowCounter = windows.reduce((max, w) => Math.max(max, w.id), 0);
    return;
  }
  try {
    const f = await window.storage.get('films', true);
    films = f ? JSON.parse(f.value) : DEFAULT_FILMS.slice();
  } catch (err) {
    films = DEFAULT_FILMS.slice();
  }
  try {
    const w = await window.storage.get('windows', true);
    windows = w ? JSON.parse(w.value) : DEFAULT_WINDOWS.slice();
  } catch (err) {
    windows = DEFAULT_WINDOWS.slice();
  }
  filmCounter = films.reduce((max, f) => Math.max(max, f.id), 0);
  windowCounter = windows.reduce((max, w) => Math.max(max, w.id), 0);
}

function renderFilms() {
  const container = document.getElementById('film-list');
  container.innerHTML = '';
  films.forEach(f => {
    const row = document.createElement('div');
    row.className = 'film-row';
    row.innerHTML = `
      <input type="text" value="${escapeAttr(f.name)}" data-id="${f.id}" data-field="name" />
      <input type="number" value="${f.price}" min="0" step="100" data-id="${f.id}" data-field="price" />
      <span class="unit">円/m²</span>
      <button class="icon-btn del-film" data-id="${f.id}" aria-label="削除">削除</button>
    `;
    container.appendChild(row);
  });

  container.querySelectorAll('input').forEach(inp => {
    inp.addEventListener('input', e => {
      const id = parseInt(e.target.dataset.id);
      const field = e.target.dataset.field;
      const film = films.find(x => x.id === id);
      if (!film) return;
      if (field === 'price') film.price = parseFloat(e.target.value) || 0;
      else film.name = e.target.value;
      renderWindowSelects();
      calc();
      saveState();
    });
  });
  container.querySelectorAll('.del-film').forEach(btn => {
    btn.addEventListener('click', e => {
      const id = parseInt(e.target.dataset.id);
      films = films.filter(f => f.id !== id);
      renderFilms();
      renderWindowSelects();
      calc();
      saveState();
    });
  });
}

function renderWindowSelects() {
  document.querySelectorAll('.film-select').forEach(sel => {
    const current = sel.dataset.current;
    sel.innerHTML = films.map(f =>
      `<option value="${f.id}" ${String(f.id) === current ? 'selected' : ''}>${escapeHtml(f.name)} (¥${f.price.toLocaleString()}/m²)</option>`
    ).join('');
  });
}

function renderWindows() {
  const container = document.getElementById('window-list');
  container.innerHTML = '';
  windows.forEach((w, idx) => {
    const card = document.createElement('div');
    card.className = 'window-card';
    card.innerHTML = `
      <div class="row-head">
        <span>窓 ${idx + 1}</span>
        <button class="icon-btn del-window" data-id="${w.id}" aria-label="削除">削除</button>
      </div>
      <div class="grid2">
        <div class="field">
          <label>幅 (mm)</label>
          <input type="text" inputmode="decimal" value="${w.width}" data-id="${w.id}" data-field="width" />
        </div>
        <div class="field">
          <label>高さ (mm)</label>
          <input type="text" inputmode="decimal" value="${w.height}" data-id="${w.id}" data-field="height" />
        </div>
      </div>
      <div class="grid2">
        <div class="field">
          <label>枚数</label>
          <input type="number" value="${w.qty}" min="1" data-id="${w.id}" data-field="qty" />
        </div>
        <div class="field">
          <label>フィルム</label>
          <select class="film-select" data-id="${w.id}" data-current="${w.filmId}"></select>
        </div>
      </div>
      <p class="row-subtotal" data-id="${w.id}"></p>
    `;
    container.appendChild(card);
  });

  renderWindowSelects();

  container.querySelectorAll('input').forEach(inp => {
    inp.addEventListener('input', e => {
      const id = parseInt(e.target.dataset.id);
      const field = e.target.dataset.field;
      const w = windows.find(x => x.id === id);
      if (!w) return;
      w[field] = parseFloat(e.target.value) || 0;
      calc();
      saveState();
    });
  });
  container.querySelectorAll('.film-select').forEach(sel => {
    sel.addEventListener('change', e => {
      const id = parseInt(e.target.dataset.id);
      const w = windows.find(x => x.id === id);
      if (!w) return;
      w.filmId = parseInt(e.target.value);
      calc();
      saveState();
    });
  });
  container.querySelectorAll('.del-window').forEach(btn => {
    btn.addEventListener('click', e => {
      const id = parseInt(e.target.dataset.id);
      windows = windows.filter(w => w.id !== id);
      renderWindows();
      calc();
      saveState();
    });
  });
}

function calc() {
  let totalPrice = 0;
  const byFilm = {};

  windows.forEach(w => {
    const film = films.find(f => f.id === w.filmId);
    const rawArea = (w.width / 1000) * (w.height / 1000) * w.qty;
    const roundedArea = round1(rawArea);
    const price = film ? roundedArea * film.price : 0;
    totalPrice += price;

    const subtotalEl = document.querySelector(`.row-subtotal[data-id="${w.id}"]`);
    if (subtotalEl) {
      subtotalEl.textContent = `${roundedArea.toFixed(1)} m² × ¥${film ? film.price.toLocaleString() : 0}/m² = ¥${Math.round(price).toLocaleString()}`;
    }

    if (film) {
      if (!byFilm[film.id]) {
        byFilm[film.id] = { name: film.name, price: film.price, area: 0, total: 0 };
      }
      byFilm[film.id].area += roundedArea;
      byFilm[film.id].total += price;
    }
  });

  const summaryContainer = document.getElementById('film-summary');
  summaryContainer.innerHTML = '';
  const filmIds = Object.keys(byFilm);
  if (filmIds.length === 0) {
    summaryContainer.innerHTML = '<p class="empty-note">窓を追加してください。</p>';
  } else {
    filmIds.forEach(id => {
      const f = byFilm[id];
      const row = document.createElement('div');
      row.className = 'film-summary-row';
      row.innerHTML = `
        <div>
          <p class="fname">${escapeHtml(f.name)}</p>
          <p class="fcalc">${f.area.toFixed(1)} m² × ¥${f.price.toLocaleString()}/m²</p>
        </div>
        <p class="ftotal">¥${Math.round(f.total).toLocaleString()}</p>
      `;
      summaryContainer.appendChild(row);
    });
  }

  document.getElementById('total-price-out').textContent = '¥' + Math.round(totalPrice).toLocaleString();
  document.getElementById('commission-out').textContent = '大輔の取り分10%: ¥' + Math.round(totalPrice * 0.1).toLocaleString();
}

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}
function escapeAttr(str) {
  return escapeHtml(str);
}

document.getElementById('add-film').addEventListener('click', () => {
  filmCounter++;
  films.push({ id: filmCounter, name: '新しいフィルム', price: 5000 });
  renderFilms();
  renderWindowSelects();
  calc();
  saveState();
});

document.getElementById('add-window').addEventListener('click', () => {
  windowCounter++;
  const defaultFilmId = films.length ? films[0].id : null;
  windows.push({ id: windowCounter, width: 1000, height: 1200, qty: 1, filmId: defaultFilmId });
  renderWindows();
  calc();
  saveState();
});

document.getElementById('print-btn').addEventListener('click', () => {
  window.print();
});

(async function init() {
  await loadState();
  renderFilms();
  renderWindows();
  calc();
  if (!hasStorage()) {
    document.getElementById('save-status').textContent = 'この端末内だけで動作中(保存されません)';
  }
})();
</script>
</body>
</html>
