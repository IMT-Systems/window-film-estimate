<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>窓フィルム見積計算</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #2b2723;
    --ink-soft: #8a7f73;
    --line: #e7dfd4;
    --line-strong: #cfc3b3;
    --paper: #f7f2ea;
    --card: #fffdfa;
    --accent: #2f4a44;
    --accent-2: #b08a52;
    --accent-soft: #eef2ee;
    --accent-text: #2f4a44;
    --danger: #a4543f;
    --danger-soft: #f6e9e3;
    --shadow: 0 1px 2px rgba(43,39,35,0.04), 0 8px 24px -8px rgba(43,39,35,0.10);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Zen Kaku Gothic New", -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
    background:
      radial-gradient(900px 500px at 100% -10%, rgba(176,138,82,0.10), transparent 60%),
      var(--paper);
    color: var(--ink);
    line-height: 1.65;
  }
  .wrap {
    max-width: 560px;
    margin: 0 auto;
    padding: 0 16px 90px;
  }
  header {
    margin: 0 -16px 28px;
    padding: 10px 16px 28px;
    background:
      linear-gradient(135deg, #2f4a44 0%, #233a35 100%);
    color: #f3efe6;
    border-radius: 0 0 28px 28px;
    box-shadow: var(--shadow);
  }    header .label {
    font-family: "Shippori Mincho", serif;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: #f3efe6;
    margin: 0 0 4px;
  }
  header h1 {
    font-family: "Shippori Mincho", serif;
    font-size: 17px;
    font-weight: 700;
    margin: 0;
    letter-spacing: 0.05em;
    color: #f3efe6;
  }
  header .sub {
    font-size: 28px;
    font-weight: 700;
    margin: 10px 0 0;
    letter-spacing: 0.02em;
    color: #f3efe6;
    text-align: center;
  }
  section {
    margin-bottom: 30px;
  }
  section h2 {
    font-family: "Shippori Mincho", serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: 0.03em;
    margin: 0 0 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  section h2::before {
    content: "";
    width: 4px;
    height: 14px;
    background: var(--accent-2);
    border-radius: 2px;
    display: inline-block;
  }
  .hint {
    font-size: 12px;
    color: var(--ink-soft);
    margin: -6px 0 14px;
  }
  .film-row, .window-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    box-shadow: var(--shadow);
  }
  .film-row {
    display: flex;
    gap: 8px;
    align-items: center;
    padding: 12px 14px;
    margin-bottom: 10px;
  }
  .film-row input[type="text"] {
    flex: 1.6;
    min-width: 0;
  }
  .film-row input[type="number"] {
    flex: 1;
    min-width: 0;
  }
  .film-row .unit {
    font-size: 12px;
    color: var(--ink-soft);
    white-space: nowrap;
  }
  input, select {
    font-family: inherit;
    font-size: 15px;
    padding: 9px 11px;
    border: 1px solid var(--line-strong);
    border-radius: 9px;
    background: var(--paper);
    color: var(--ink);
    width: 100%;
  }
  input:focus, select:focus {
    outline: none;
    border-color: var(--accent-2);
    box-shadow: 0 0 0 3px rgba(176,138,82,0.15);
  }
  button {
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    border-radius: 9px;
    border: 1px solid var(--line-strong);
    background: var(--card);
    color: var(--ink);
    padding: 10px 14px;
    transition: all 0.15s ease;
  }
  button:hover { background: var(--accent-soft); border-color: var(--accent); }
  button:active { transform: scale(0.97); }
  .icon-btn {
    border: none;
    background: transparent;
    color: var(--danger);
    padding: 6px 10px;
    font-size: 12px;
    box-shadow: none;
  }
  .icon-btn:hover { background: var(--danger-soft); border-radius: 6px; }
  .add-btn {
    width: 100%;
    margin-top: 6px;
    border: 1.5px dashed var(--accent-2);
    color: var(--accent);
    background: transparent;
    box-shadow: none;
    font-weight: 600;
  }
  .add-btn:hover { background: var(--accent-soft); }
  .window-card {
    padding: 16px;
    margin-bottom: 14px;
  }
  .window-card .row-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    padding-bottom: 10px;
    border-bottom: 1px dashed var(--line);
  }
  .window-card .row-head span {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--accent-2);
    text-transform: uppercase;
  }
  .grid2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 8px;
  }
  .field label {
    display: block;
    font-size: 11px;
    color: var(--ink-soft);
    margin-bottom: 4px;
    letter-spacing: 0.02em;
  }
  .row-subtotal {
    font-size: 12px;
    color: var(--ink-soft);
    text-align: right;
    margin: 10px 0 0;
    font-weight: 500;
  }
  .film-summary-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--card);
    border: 1px solid var(--line);
    border-left: 3px solid var(--accent-2);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 8px;
    box-shadow: var(--shadow);
  }
  .film-summary-row .fname { font-size: 13px; font-weight: 700; margin: 0; }
  .film-summary-row .fcalc { font-size: 14px; color: var(--ink-soft); margin: 3px 0 0; }
  .film-summary-row .ftotal { font-size: 16px; font-weight: 700; margin: 0; color: var(--accent); }
  .empty-note {
    font-size: 13px;
    color: var(--ink-soft);
  }
  .total-box {
    background: linear-gradient(135deg, #2f4a44 0%, #233a35 100%);
    border-radius: 18px;
    padding: 22px 20px;
    box-shadow: var(--shadow);
    color: #f3efe6;
  }
  .total-box .label2 {
    font-size: 11px;
    letter-spacing: 0.1em;
    color: #c9b88f;
    margin: 0 0 6px;
  }
  .total-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .total-label {
    font-size: 13px;
    color: #c9b88f;
  }
  .total-val {
    font-size: 16px;
    font-weight: 600;
    color: #f3efe6;
  }
  .total-box .amount {
    font-family: "Shippori Mincho", serif;
    font-size: 32px;
    font-weight: 700;
    margin: 0;
  }
  .total-box .commission {
    font-size: 12px;
    color: #c9b88f;
    text-align: right;
    margin: 10px 0 0;
  }
  .save-status {
    font-size: 11px;
    color: var(--ink-soft);
    text-align: right;
    margin-top: 8px;
  }
  .print-btn {
    width: 100%;
    margin-top: 18px;
    padding: 14px;
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    background: var(--accent-2);
    border: none;
    box-shadow: var(--shadow);
  }
  .print-btn:hover { background: #9a753f; }

  @media print {
    body { background: #fff; }
    header {
    position: relative; background: #2f4a44 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .total-box { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    #add-film, #add-window, .icon-btn, .print-btn, .save-status { display: none !important; }
    #film-section { display: none !important; }
    #discount-section { display: none !important; }
    input, select { border: none; background: transparent; padding: 2px 0; }
    .window-card, .film-row, .film-summary-row { box-shadow: none; }
  }
</style>
</head>

    <div class="field" style="margin-top:10px;">
      <label style="font-size:14px; font-weight:600; color:var(--ink); display:flex; align-items:center; gap:8px; margin-bottom:8px;"><span style="width:4px; height:14px; background:var(--accent-2); border-radius:2px; display:inline-block;"></span>方角</label>
      <input type="text" id="direction" placeholder="例: 南向き" />
    </div>
    <div class="field" style="margin-top:10px;">
      <label style="font-size:14px; font-weight:600; color:var(--ink); display:flex; align-items:center; gap:8px; margin-bottom:8px;"><span style="width:4px; height:14px; background:var(--accent-2); border-radius:2px; display:inline-block;"></span>カーテン・ブラインドの有無</label>
      <select id="curtain">
        <option value="">選択してください</option>
        <option value="100mm以上">100mm以上</option>
        <option value="100mm未満">100mm未満</option>
      </select>
    </div>
  </section>

  <section id="film-section">
    <h2>フィルム単価表</h2>
    <div id="film-list"></div>
  </section>

  <section>
    <h2>窓の寸法</h2>
    <p class="hint">各窓の面積(枚数込み)を小数点第1位で四捨五入し、その値に単価をかけます。</p>
    <div id="window-list"></div>
    <button class="add-btn" id="add-window">+ 窓を追加</button>
  </section>

  <section>
    <h2>フィルム別 集計</h2>
    <div id="film-summary"></div>
  </section>

  <section id="labor-section">
    <h2>工賃</h2>
    <div style="display:flex; align-items:center; gap:8px;">
      <input type="number" id="labor-cost" value="15000" min="0" step="500" style="flex:1;" />
      <span style="font-size:13px; color:var(--ink-soft); white-space:nowrap;">円</span>
    </div>
  </section>

  <section id="travel-section">
    <h2>出張費</h2>
    <div style="display:flex; align-items:center; gap:8px;">
      <input type="number" id="travel-cost" value="" min="0" step="500" placeholder="0" style="flex:1;" />
      <span style="font-size:13px; color:var(--ink-soft); white-space:nowrap;">円</span>
    </div>
  </section>

  <section id="discount-section">
    <h2>割引</h2>
    <div style="display:flex; align-items:center; gap:8px;">
      <input type="number" id="discount-rate" value="" min="0" max="100" step="1" placeholder="0" style="flex:1;" />
      <span style="font-size:13px; color:var(--ink-soft); white-space:nowrap;">%（フィルム合計から割引）</span>
    </div>
  </section>

  <div class="total-box">
    <div class="total-row">
      <span class="total-label">フィルム合計</span>
      <span class="total-val" id="total-price-out">¥0</span>
    </div>
    <div class="total-row">
      <span class="total-label">工賃</span>
      <span class="total-val" id="labor-display">¥15,000</span>
    </div>
    <div class="total-row">
      <span class="total-label">出張費</span>
      <span class="total-val" id="travel-display">¥0</span>
    </div>
    <div class="total-row" id="discount-row">
      <span class="total-label">割引額</span>
      <span class="total-val" id="discount-display" style="color:#f9c74f;">-¥0</span>
    </div>
    <div style="border-top:1px solid rgba(255,255,255,0.25); margin:12px 0;"></div>
    <div class="total-row">
      <span class="total-label" style="font-size:14px; font-weight:700;">小計</span>
      <span class="total-val" id="estimate-out" style="font-size:20px; font-weight:700;">¥0</span>
    </div>
    <div class="total-row" style="margin-top:6px;">
      <span class="total-label">消費税（10%）</span>
      <span class="total-val" id="tax-out">¥0</span>
    </div>
    <div class="total-row" style="margin-top:6px;">
      <span class="total-label">端数調整</span>
      <span class="total-val" id="fraction-out" style="color:#c9b88f;">¥0</span>
    </div>
    <div style="border-top:1px solid rgba(255,255,255,0.25); margin:12px 0;"></div>
    <div class="total-row">
      <span class="total-label" style="font-size:14px; font-weight:700;">見積総額（税込）</span>
      <span class="total-val" id="grand-total-out" style="font-size:26px; font-weight:700;">¥0</span>
    </div>
  </div>

  <button id="print-btn" class="print-btn">📄 見積をPDFで保存</button>

  <section id="memo-section" style="margin-top:20px;">
    <h2>メモ</h2>
    <textarea id="memo" placeholder="自由にメモを入力してください" style="width:100%; min-height:120px; font-family:inherit; font-size:15px; padding:10px 12px; border:1px solid var(--line-strong); border-radius:9px; background:var(--paper); color:var(--ink); resize:vertical; line-height:1.6;"></textarea>
  </section>

  <p class="save-status" id="save-status">保存済み</p>
  <p class="hint" style="text-align:right; margin-top:-2px;">※このデータはリンクを知っている人全員で共有されます</p>

</div>

<script>
const FILM_MASTER = [
  { name: 'シルバー遮熱 RSP15', price: 13500 },
  { name: 'シルバー遮熱 RSP35', price: 13500 },
  { name: 'シルバー遮断熱 RSP35LE', price: 16500 },
  { name: '外貼りシルバー RSP15EX', price: 14500 },
  { name: '外貼りシルバー RSP35EX', price: 14500 },
  { name: 'クリア遮熱 NS60', price: 15500 },
  { name: 'クリア遮熱 NS70', price: 15500 },
  { name: 'クリア遮断熱 NS70LE', price: 18500 },
  { name: 'ナチュラル遮熱 CBL80', price: 15500 },
  { name: '飛散防止 SN50', price: 10500 },
  { name: '貫通対策 SN100', price: 13500 },
  { name: '貫通対策 SN200', price: 15500 },
  { name: '凹凸遮熱 RSP35U', price: 18500 },
  { name: '凹凸飛散防止 SN50U', price: 11500 },
  { name: '凹凸防犯 SN200U', price: 12000 },
  { name: '外貼り飛散防止 SN50EX', price: 11500 },
  { name: 'マットホワイト MT-01', price: 11500 },
  { name: 'フロスティア FT-03', price: 19000 },
  { name: 'スノーホワイト GD-52', price: 18000 },
  { name: 'SHIRAKABA GD-41', price: 21000 },
  { name: 'TSUBU-YUKI GD-51', price: 12500 },
];

const DEFAULT_FILMS = [
  { id: 1, name: 'シルバー遮熱 RSP15', price: 13500 }
];
const DEFAULT_WINDOWS = [
  { id: 1, width: 1000, height: 1200, qty: 1, filmName: 'シルバー遮熱 RSP15' }
];

let films = [];
let windows = [];
let customerName = '';
let glassType = '';
let glassModel = '';
let glassThickness = '';
let direction = '';
let curtain = '';
let memo = '';
let filmCounter = 0;
let windowCounter = 0;
let saveTimer = null;

function round1(n) {
  return Math.round(n * 10) / 10;
}

function markSaving() {
  const el = document.getElementById('save-status');
  el.textContent = '保存中…';
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => { el.textContent = '保存済み'; }, 500);
}

function hasStorage() {
  try { localStorage.setItem('_test', '1'); localStorage.removeItem('_test'); return true; }
  catch(e) { return false; }
}

async function saveState() {
  if (!hasStorage()) return;
  try {
    localStorage.setItem('qest_films', JSON.stringify(films));
    localStorage.setItem('qest_windows', JSON.stringify(windows));
    localStorage.setItem('qest_customerName', customerName);
    localStorage.setItem('qest_glassType', glassType);
    localStorage.setItem('qest_glassModel', glassModel);
    localStorage.setItem('qest_glassThickness', glassThickness);
    localStorage.setItem('qest_direction', direction);
    localStorage.setItem('qest_curtain', curtain);
    localStorage.setItem('qest_memo', memo);
    markSaving();
  } catch (err) {
    console.error('保存に失敗しました', err);
  }
}

async function loadState() {
  if (!hasStorage()) {
    films = DEFAULT_FILMS.slice();
    windows = DEFAULT_WINDOWS.slice();
    customerName = ''; glassType = ''; glassModel = '';
    glassThickness = ''; direction = ''; curtain = ''; memo = '';
    filmCounter = films.reduce((max, f) => Math.max(max, f.id), 0);
    windowCounter = windows.reduce((max, w) => Math.max(max, w.id), 0);
    return;
  }
  try {
    const f = localStorage.getItem('qest_films');
    films = f ? JSON.parse(f) : DEFAULT_FILMS.slice();
  } catch(e) { films = DEFAULT_FILMS.slice(); }
  try {
    const w = localStorage.getItem('qest_windows');
    windows = w ? JSON.parse(w) : DEFAULT_WINDOWS.slice();
  } catch(e) { windows = DEFAULT_WINDOWS.slice(); }
  customerName   = localStorage.getItem('qest_customerName')   || '';
  glassType      = localStorage.getItem('qest_glassType')      || '';
  glassModel     = localStorage.getItem('qest_glassModel')     || '';
  glassThickness = localStorage.getItem('qest_glassThickness') || '';
  direction      = localStorage.getItem('qest_direction')      || '';
  curtain        = localStorage.getItem('qest_curtain')        || '';
  memo           = localStorage.getItem('qest_memo')           || '';
  filmCounter    = films.reduce((max, f) => Math.max(max, f.id), 0);
  windowCounter  = windows.reduce((max, w) => Math.max(max, w.id), 0);
}

function renderFilms() {
  const container = document.getElementById('film-list');
  container.innerHTML = '';
  films.slice(0, 1).forEach(f => {
    const row = document.createElement('div');
    row.className = 'film-row';
    row.style.flexDirection = 'column';
    row.style.gap = '8px';
    row.innerHTML = `
      <select data-id="${f.id}" data-field="name" style="width:100%;">
        ${FILM_MASTER.map(m => `<option value="${escapeAttr(m.name)}" ${m.name === f.name ? 'selected' : ''}>${escapeHtml(m.name)}</option>`).join('')}
      </select>
      <div style="display:flex; gap:8px; align-items:center;">
        <input type="number" value="${f.price}" min="0" step="100" data-id="${f.id}" data-field="price" style="flex:1;" />
        <span class="unit">円/m²</span>
      </div>
    `;
    container.appendChild(row);
  });

  container.querySelectorAll('select[data-field="name"]').forEach(sel => {
    sel.addEventListener('change', e => {
      const id = parseInt(e.target.dataset.id);
      const film = films.find(x => x.id === id);
      if (!film) return;
      film.name = e.target.value;
      const master = FILM_MASTER.find(m => m.name === e.target.value);
      if (master) {
        film.price = master.price;
        const priceInput = e.target.closest('.film-row').querySelector('input[data-field="price"]');
        if (priceInput) priceInput.value = master.price;
      }
      renderWindowSelects();
      calc();
      saveState();
    });
  });

  container.querySelectorAll('input[data-field="price"]').forEach(inp => {
    inp.addEventListener('input', e => {
      const id = parseInt(e.target.dataset.id);
      const film = films.find(x => x.id === id);
      if (!film) return;
      film.price = parseFloat(e.target.value) || 0;
      renderWindowSelects();
      calc();
      saveState();
    });
  });
}

function renderWindowSelects() {
  document.querySelectorAll('.film-select').forEach(sel => {
    const current = sel.dataset.current;
    sel.innerHTML = FILM_MASTER.map(m =>
      `<option value="${escapeHtml(m.name)}" ${m.name === current ? 'selected' : ''}>${escapeHtml(m.name)} (¥${m.price.toLocaleString()}/m²)</option>`
    ).join('');
  });
}

function renderWindows() {
  const container = document.getElementById('window-list');
  container.innerHTML = '';
  windows.forEach((w, idx) => {
    const card = document.createElement('div');
    card.className = 'window-card';
    card.innerHTML = `
      <div class="row-head">
        <span>窓 ${idx + 1}</span>
        <button class="icon-btn del-window" data-id="${w.id}" aria-label="削除">削除</button>
      </div>
      <div class="grid2">
        <div class="field">
          <label>幅 (mm)</label>
          <input type="text" inputmode="decimal" value="${w.width}" data-id="${w.id}" data-field="width" />
        </div>
        <div class="field">
          <label>高さ (mm)</label>
          <input type="text" inputmode="decimal" value="${w.height}" data-id="${w.id}" data-field="height" />
        </div>
      </div>
      <div class="grid2">
        <div class="field">
          <label>枚数</label>
          <input type="number" value="${w.qty}" min="1" data-id="${w.id}" data-field="qty" />
        </div>
        <div class="field">
          <label>フィルム</label>
          <select class="film-select" data-id="${w.id}" data-current="${escapeHtml(w.filmName || '')}"></select>
        </div>
      </div>
      <p class="row-subtotal" data-id="${w.id}"></p>
    `;
    container.appendChild(card);
  });

  renderWindowSelects();

  container.querySelectorAll('input').forEach(inp => {
    inp.addEventListener('input', e => {
      const id = parseInt(e.target.dataset.id);
      const field = e.target.dataset.field;
      const w = windows.find(x => x.id === id);
      if (!w) return;
      w[field] = parseFloat(e.target.value) || 0;
      calc();
      saveState();
    });
  });
  container.querySelectorAll('.film-select').forEach(sel => {
    sel.addEventListener('change', e => {
      const id = parseInt(e.target.dataset.id);
      const w = windows.find(x => x.id === id);
      if (!w) return;
      w.filmName = e.target.value;
      e.target.dataset.current = e.target.value;
      calc();
      saveState();
    });
  });
  container.querySelectorAll('.del-window').forEach(btn => {
    btn.addEventListener('click', e => {
      const id = parseInt(e.target.dataset.id);
      windows = windows.filter(w => w.id !== id);
      renderWindows();
      calc();
      saveState();
    });
  });
}

function calc() {
  let totalPrice = 0;
  const byFilm = {};

  windows.forEach(w => {
    const master = FILM_MASTER.find(m => m.name === w.filmName);
    const price = master ? master.price : 0;
    const rawArea = (w.width / 1000) * (w.height / 1000) * w.qty;
    const roundedArea = round1(rawArea);
    const rowTotal = roundedArea * price;
    totalPrice += rowTotal;

    const subtotalEl = document.querySelector(`.row-subtotal[data-id="${w.id}"]`);
    if (subtotalEl) {
      subtotalEl.textContent = `${roundedArea.toFixed(1)} m² × ¥${price.toLocaleString()}/m² = ¥${Math.round(rowTotal).toLocaleString()}`;
    }

    if (master) {
      if (!byFilm[master.name]) {
        byFilm[master.name] = { name: master.name, price, area: 0, total: 0 };
      }
      byFilm[master.name].area += roundedArea;
      byFilm[master.name].total += rowTotal;
    }
  });

  const summaryContainer = document.getElementById('film-summary');
  summaryContainer.innerHTML = '';
  const filmIds = Object.keys(byFilm);
  if (filmIds.length === 0) {
    summaryContainer.innerHTML = '<p class="empty-note">窓を追加してください。</p>';
  } else {
    filmIds.forEach(id => {
      const f = byFilm[id];
      const row = document.createElement('div');
      row.className = 'film-summary-row';
      row.innerHTML = `
        <div>
          <p class="fname">${escapeHtml(f.name)}</p>
          <p class="fcalc">${f.area.toFixed(1)} m² × ¥${f.price.toLocaleString()}/m²</p>
        </div>
        <p class="ftotal">¥${Math.round(f.total).toLocaleString()}</p>
      `;
      summaryContainer.appendChild(row);
    });
  }

  const laborCost = parseFloat(document.getElementById('labor-cost').value) || 0;
  const travelCost = parseFloat(document.getElementById('travel-cost').value) || 0;
  const discountRate = parseFloat(document.getElementById('discount-rate').value) || 0;
  const discountAmt = Math.round(totalPrice * discountRate / 100);
  const estimate = totalPrice - discountAmt + laborCost + travelCost;
  const tax = Math.round(estimate * 0.1);
  const beforeAdjust = estimate + tax;
  const grandTotal = Math.floor(beforeAdjust / 100) * 100;
  const fractionAdj = grandTotal - beforeAdjust;

  document.getElementById('total-price-out').textContent = '¥' + Math.round(totalPrice).toLocaleString();
  document.getElementById('labor-display').textContent = '¥' + Math.round(laborCost).toLocaleString();
  document.getElementById('travel-display').textContent = '¥' + Math.round(travelCost).toLocaleString();
  document.getElementById('discount-display').textContent = '-¥' + discountAmt.toLocaleString();
  document.getElementById('estimate-out').textContent = '¥' + estimate.toLocaleString();
  document.getElementById('tax-out').textContent = '¥' + tax.toLocaleString();
  document.getElementById('fraction-out').textContent = (fractionAdj >= 0 ? '+' : '') + '¥' + fractionAdj.toLocaleString();
  document.getElementById('grand-total-out').textContent = '¥' + grandTotal.toLocaleString();
}

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}
function escapeAttr(str) {
  return escapeHtml(str);
}

document.getElementById('discount-rate').addEventListener('input', () => { calc(); });

document.getElementById('travel-cost').addEventListener('input', () => {
  calc();
});

document.getElementById('labor-cost').addEventListener('input', e => {
  const val = parseFloat(e.target.value) || 0;
  document.getElementById('labor-display').textContent = '¥' + Math.round(val).toLocaleString();
  calc();
});

document.getElementById('memo').addEventListener('input', e => {
  memo = e.target.value;
  saveState();
});

document.getElementById('direction').addEventListener('input', e => {
  direction = e.target.value;
  saveState();
});
document.getElementById('curtain').addEventListener('change', e => {
  curtain = e.target.value;
  saveState();
});

document.getElementById('glass-type').addEventListener('change', e => {
  glassType = e.target.value;
  saveState();
});
document.getElementById('glass-model').addEventListener('input', e => {
  glassModel = e.target.value;
  saveState();
});
document.getElementById('glass-thickness').addEventListener('input', e => {
  glassThickness = e.target.value;
  saveState();
});

document.getElementById('customer-name').addEventListener('input', e => {
  customerName = e.target.value;
  saveState();
});

document.getElementById('add-window').addEventListener('click', () => {
  windowCounter++;
  const defaultFilmName = FILM_MASTER[0].name;
  windows.push({ id: windowCounter, width: 1000, height: 1200, qty: 1, filmName: defaultFilmName });
  renderWindows();
  calc();
  saveState();
});

document.getElementById('print-btn').addEventListener('click', () => {
  window.print();
});

(async function init() {
  await loadState();
  document.getElementById('customer-name').value = customerName;
  document.getElementById('glass-type').value = glassType;
  document.getElementById('glass-model').value = glassModel;
  document.getElementById('glass-thickness').value = glassThickness;
  document.getElementById('direction').value = direction;
  document.getElementById('curtain').value = curtain;
  document.getElementById('memo').value = memo;
  renderFilms();
  renderWindows();
  calc();
  if (!hasStorage()) {
    document.getElementById('save-status').textContent = '保存できません';
  }
})();
</script>
</body>
</html>
